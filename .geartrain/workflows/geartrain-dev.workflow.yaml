schema_version: 1
name: geartrain-dev
description: "Dogfooding workflow — picks a task, runs coder, passes to lead, logs result"
version: 0.1.0

trigger:
  type: manual

channels:
  human: cli

agents:
  lead: lead
  coder: coder

graph:
  entry: run_coder
  nodes:
    run_coder:
      type: agent
      agent: coder
      inputs:
        task: ${trigger.task}
      output_key: coder_output
      transitions:
        default: run_lead

    run_lead:
      type: agent
      agent: lead
      inputs:
        task: ${nodes.coder_output.output}
      output_key: lead_output
      transitions:
        default: end
